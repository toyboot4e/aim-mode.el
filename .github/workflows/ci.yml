name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      # Formatting: nixfmt via treefmt (pure, offline).
      - run: nix flake check -L
      # Elisp package: compile + lint + test (pure, offline derivation).
      - run: nix build .#tests -L
      # Workflow security: zizmor audit + pinact pin verification.
      - run: nix develop --command just audit
      - run: nix develop --command just pin-check
        env:
          GITHUB_TOKEN: ${{ github.token }}
